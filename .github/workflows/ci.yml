name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testes-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes da API
        run: python -m pytest tests/ -v --ignore=tests/test_modelo.py

  testes-integracao:
    runs-on: ubuntu-latest
    needs: testes-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar autenticação com Hugging Face
        run: python -c "import os; assert os.environ.get('HF_TOKEN'), 'HF_TOKEN não configurado'"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Rodar testes de integração
        run: python -m pytest tests/test_modelo.py -v
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}